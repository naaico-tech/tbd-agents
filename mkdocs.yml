site_name: TBD Agents
site_description: "Your agents. Your rules. Your infrastructure."
site_url: https://naaico-tech.github.io/tbd-agents/
repo_url: https://github.com/naaico-tech/tbd-agents
repo_name: naaico-tech/tbd-agents

theme:
  name: material
  palette:
    scheme: default
    primary: black
    accent: cyan
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - header.autohide
    - toc.follow

extra_css:
  - stylesheets/naaico.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/naaico-tech/tbd-agents
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/naaico
  generator: false

copyright: "&copy; 2026 NAAICO. All rights reserved."

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Quick Start: getting-started/quickstart.md
      - Local Setup: getting-started/local-setup.md
      - Configuration: getting-started/configuration.md
      - Migration & Upgrade: getting-started/migration.md
  - Guide:
      - guide/index.md
      - Agents: guide/agents.md
      - MCP Tools: guide/mcp-tools.md
      - Skills: guide/skills.md
      - Workflows: guide/workflows.md
      - Streaming: guide/streaming.md
      - Knowledge Bases: guide/knowledge.md
      - Agent Memory: guide/memory.md
      - Guardrails: guide/guardrails.md
      - BYOK Providers: guide/byok-providers.md
      - Custom Tools: guide/custom-tools.md
      - Agent Chat: guide/agent-chat.md
      - Observability: guide/observability.md
  - Architecture:
      - architecture/index.md
      - System Overview: architecture/system-overview.md
      - Data Model: architecture/data-model.md
      - Scaling: architecture/scaling.md
  - API Reference:
      - api/index.md
      - Agents: api/agents.md
      - Chat: api/chat.md
      - Skills: api/skills.md
      - MCP Servers: api/mcp-servers.md
      - Workflows: api/workflows.md
      - Knowledge: api/knowledge.md
      - Memory: api/memory.md
      - Providers: api/providers.md
      - Custom Tools: api/custom-tools.md
      - Tokens: api/tokens.md
      - Guardrails: api/guardrails.md
      - Tasks: api/tasks.md
      - Models: api/models.md
  - Contributing: contributing.md
