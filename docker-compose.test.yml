# Docker Compose profile for integration tests.
# Usage: docker compose -f docker-compose.test.yml up -d
#        pytest tests/integration/ -v
#        docker compose -f docker-compose.test.yml down -v

services:
  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"
    tmpfs:
      - /data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    tmpfs:
      - /data
