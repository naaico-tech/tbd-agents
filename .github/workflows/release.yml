# ─────────────────────────────────────────────────────────────────────────────
# Publish Docker image to GitHub Container Registry (GHCR) on release.
#
# Triggered only when a GitHub Release is *published* (not drafted/edited).
# Builds a multi-platform image (linux/amd64 + linux/arm64) via QEMU + Buildx,
# tags it with the semver release tag (e.g. v0.1.0), major.minor (0.1), and
# "latest", then pushes to ghcr.io/naaico-tech/tbd-agents.
#
# No PAT required — the built-in GITHUB_TOKEN has "packages: write" permission
# when enabled at the job level below.
# ─────────────────────────────────────────────────────────────────────────────

name: Publish Docker image to GHCR

on:
  release:
    types: [published]   # fires only when a release is published (not draft)

jobs:
  build-and-push:
    name: Build & push multi-platform image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Grant the workflow token permission to push to GHCR.
    # "contents: read" is the minimum needed for checkout.
    # "packages: write" allows docker/login-action to authenticate with GHCR.
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Check out the repository at the release tag ───────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU for cross-platform emulation (needed for arm64 builds)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx (multi-platform builder with BuildKit) ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Authenticate to GHCR using the built-in GITHUB_TOKEN ─────────────
      #       No PAT needed — packages:write permission above is sufficient.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Generate OCI-compatible image tags and labels from the release ────
      #       Tags produced (example for release tag "v0.1.0"):
      #         ghcr.io/naaico-tech/tbd-agents:v0.1.0   (full semver)
      #         ghcr.io/naaico-tech/tbd-agents:0.1       (major.minor)
      #         ghcr.io/naaico-tech/tbd-agents:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/naaico-tech/tbd-agents
          tags: |
            # Full semver tag, e.g. v0.1.0
            type=semver,pattern={{version}}
            # Major.minor tag, e.g. 0.1
            type=semver,pattern={{major}}.{{minor}}
            # Always update the "latest" tag on every release
            type=raw,value=latest

      # ── 6. Build image for linux/amd64 & linux/arm64 and push to GHCR ───────
      #       Registry-backed cache (type=registry) avoids a cold cache on every
      #       run and works transparently with the multi-platform builder.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pull layer cache from GHCR to speed up repeat builds.
          cache-from: type=registry,ref=ghcr.io/naaico-tech/tbd-agents:buildcache
          # Write the updated cache back after the build finishes.
          cache-to: type=registry,ref=ghcr.io/naaico-tech/tbd-agents:buildcache,mode=max
