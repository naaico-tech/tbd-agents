services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=copilot_agent_hub
      - REDIS_URL=redis://redis:6379/0
      - DEFAULT_MODEL=gpt-4.1
      - DEFAULT_MAX_TURNS=5
      - SESSION_TIMEOUT=600
      # Optional server-level GitHub token (per-request tokens take priority)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Datadog MCP credentials
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_APP_KEY=${DD_APP_KEY:-}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      # Atlassian / Jira MCP credentials
      - ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN:-}
      - ATLASSIAN_EMAIL=${ATLASSIAN_EMAIL:-}
      - ATLASSIAN_URL=${ATLASSIAN_URL:-}
      # Token store encryption key — must be the same across app + worker
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - repos_data:/repos
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=copilot_agent_hub
      - REDIS_URL=redis://redis:6379/0
      - DEFAULT_MODEL=gpt-4.1
      - DEFAULT_MAX_TURNS=5
      - SESSION_TIMEOUT=600
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_APP_KEY=${DD_APP_KEY:-}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN:-}
      - ATLASSIAN_EMAIL=${ATLASSIAN_EMAIL:-}
      - ATLASSIAN_URL=${ATLASSIAN_URL:-}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - repos_data:/repos
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  repos_data:
