# Production compose file — pulls pre-built images from the registry.
# For local development (build from source) use docker-compose-dev.yml instead.
# Usage: TBD_IMAGE=ghcr.io/naaico-tech/tbd-agents:v0.1.0 docker compose up
x-app-image: &app-image
  image: ${TBD_IMAGE:-ghcr.io/naaico-tech/tbd-agents:latest}

services:
  app:
    <<: *app-image
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_BACKEND=${DB_BACKEND:-mongo}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-copilot_agent_hub}
      - POSTGRES_URI=${POSTGRES_URI:-postgresql+asyncpg://postgres:postgres@pgvector:5432/tbd_agents}
      - REDIS_URL=redis://redis:6379/0
      - DEFAULT_MODEL=gpt-4.1
      - DEFAULT_MAX_TURNS=5
      - SESSION_TIMEOUT=600
      # Optional server-level GitHub token (per-request tokens take priority)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Datadog MCP credentials
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_APP_KEY=${DD_APP_KEY:-}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      # Atlassian / Jira MCP credentials
      - ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN:-}
      - ATLASSIAN_EMAIL=${ATLASSIAN_EMAIL:-}
      - ATLASSIAN_URL=${ATLASSIAN_URL:-}
      # Token store encryption key — must be the same across app + worker
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=tbd-agents-api
      - OTEL_RESOURCE_ATTRIBUTES=service.version=0.1.0,deployment.environment=docker
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - PGVECTOR_DSN=${PGVECTOR_DSN:-postgresql+asyncpg://postgres:postgres@pgvector:5432/tbd_agents}
      - VECTOR_STORE_BACKEND=${VECTOR_STORE_BACKEND:-qdrant}
      # Codegraph — sidecar URL (no workspace path needed; sidecar owns the volume)
      - CODEGRAPH_ENABLED=${CODEGRAPH_ENABLED:-false}
      - CODEGRAPH_SIDECAR_URL=http://codegraph-sidecar:3001
    depends_on:
      mongodb:
        condition: service_started
        required: false
      redis:
        condition: service_started
      otel-collector:
        condition: service_started
      codegraph-sidecar:
        condition: service_healthy
        required: false
    volumes:
      - repos_data:/repos
    restart: unless-stopped

  # ── CodeGraph sidecar ────────────────────────────────────────────────────────
  # Manages git cloning, codegraph indexing, and exposes an MCP-over-SSE
  # endpoint per indexed repo.  The main app delegates all heavy work here.
  codegraph-sidecar:
    image: ${CODEGRAPH_SIDECAR_IMAGE:-ghcr.io/naaico-tech/codegraph-sidecar:latest}
    environment:
      - PORT=3001
      - WORKSPACE=/opt/codegraph_repos
    volumes:
      - codegraph_repos:/opt/codegraph_repos
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    profiles:
      - codegraph

  worker:
    <<: *app-image
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - DB_BACKEND=${DB_BACKEND:-mongo}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-copilot_agent_hub}
      - POSTGRES_URI=${POSTGRES_URI:-postgresql+asyncpg://postgres:postgres@pgvector:5432/tbd_agents}
      - REDIS_URL=redis://redis:6379/0
      - DEFAULT_MODEL=gpt-4.1
      - DEFAULT_MAX_TURNS=5
      - SESSION_TIMEOUT=600
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_APP_KEY=${DD_APP_KEY:-}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN:-}
      - ATLASSIAN_EMAIL=${ATLASSIAN_EMAIL:-}
      - ATLASSIAN_URL=${ATLASSIAN_URL:-}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=tbd-agents-worker
      - OTEL_RESOURCE_ATTRIBUTES=service.version=0.1.0,deployment.environment=docker
      - WORKER_METRICS_PORT=9101
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    expose:
      - "9101"
    depends_on:
      mongodb:
        condition: service_started
        required: false
      redis:
        condition: service_started
      otel-collector:
        condition: service_started
    volumes:
      - repos_data:/repos
    restart: unless-stopped

  beat:
    <<: *app-image
    command: celery -A app.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    env_file:
      - .env
    environment:
      - DB_BACKEND=${DB_BACKEND:-mongo}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-copilot_agent_hub}
      - POSTGRES_URI=${POSTGRES_URI:-postgresql+asyncpg://postgres:postgres@pgvector:5432/tbd_agents}
      - REDIS_URL=redis://redis:6379/0
      - DEFAULT_MODEL=gpt-4.1
      - DEFAULT_MAX_TURNS=5
      - SESSION_TIMEOUT=600
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_APP_KEY=${DD_APP_KEY:-}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN:-}
      - ATLASSIAN_EMAIL=${ATLASSIAN_EMAIL:-}
      - ATLASSIAN_URL=${ATLASSIAN_URL:-}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=tbd-agents-beat
      - OTEL_RESOURCE_ATTRIBUTES=service.version=0.1.0,deployment.environment=docker
    depends_on:
      mongodb:
        condition: service_started
        required: false
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Profile: qdrant — MongoDB document store (paired with Qdrant vector store)
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    profiles:
      - qdrant

  # ── Backend Profiles ─────────────────────────────────────────────────────────
  # Profile: qdrant   → MongoDB document store + Qdrant vector store
  # Profile: pgvector → PostgreSQL document store + pgvector vector store
  # Usage:   COMPOSE_PROFILES=qdrant   docker compose up
  #          COMPOSE_PROFILES=pgvector docker compose up

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tbd-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    profiles:
      - qdrant

  # ── Optional: PgVector ───────────────────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: tbd-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-postgres}
      POSTGRES_DB: ${PGVECTOR_DB:-tbd_agents}
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    profiles:
      - pgvector

  # ── Observability Stack ─────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    command: ["--config", "/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter
    depends_on:
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=copilot
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_EXPLORE_ENABLED=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor tempoSearch tempoServiceGraph
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  repos_data:
  codegraph_repos:
  qdrant_data:
  pgvector_data:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:
