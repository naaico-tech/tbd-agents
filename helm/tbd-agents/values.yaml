# -- Container image settings (shared by API + Worker)
image:
  repository: copilot-agent-hub
  tag: ""  # defaults to Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ── API Server ────────────────────────────────────────────────────────────────

api:
  replicaCount: 2

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  # -- HPA-based autoscaling for the API pods
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    scaleDown:
      stabilizationWindowSeconds: 300
      percentPolicy: 25
    scaleUp:
      stabilizationWindowSeconds: 30
      percentPolicy: 100
      podsPolicy: 4

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: copilot-agent-hub.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: copilot-agent-hub-tls
    #    hosts:
    #      - copilot-agent-hub.local

# ── Celery Worker ─────────────────────────────────────────────────────────────

worker:
  replicaCount: 1
  concurrency: 4

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

  # -- KEDA-based autoscaling for worker pods.
  #    Scales based on the length of the Celery task queue in Redis.
  #    When free tasks are waiting, KEDA spins up more worker pods (up to maxReplicaCount).
  #    When the queue drains, it scales back down to minReplicaCount (or idleReplicaCount).
  keda:
    enabled: true
    pollingInterval: 15          # seconds — how often KEDA checks the queue
    cooldownPeriod: 300          # seconds — wait before scaling to zero / min after queue empty
    minReplicaCount: 1           # minimum workers kept running
    maxReplicaCount: 8           # upper scaling limit
    idleReplicaCount: 0          # scale to zero when no tasks (set to 1 to keep warm)
    fallbackReplicas: 2          # replicas if KEDA can't reach Redis
    celeryQueueName: celery      # Celery default queue name
    listLength: "5"              # target tasks-per-worker — triggers scale-up
    activationListLength: "1"    # queue length that wakes a scaled-to-zero deployment
    databaseIndex: "0"           # Redis DB index (from REDIS_URL path)

# ── Shared Configuration ──────────────────────────────────────────────────────

config:
  mongoUri: "mongodb://mongodb:27017"
  mongoDbName: "copilot_agent_hub"
  defaultModel: "gpt-4.1"
  defaultMaxTurns: "5"
  sessionTimeout: "600"
  otelEndpoint: "http://otel-collector:4317"
  environment: "production"
  ddSite: ""
  atlassianUrl: ""

# ── Secrets (prefer externalSecrets or sealed-secrets in production) ──────────

secrets:
  redisUrl: "redis://redis:6379/0"
  githubToken: ""
  tokenEncryptionKey: ""
  ddApiKey: ""
  ddAppKey: ""
  atlassianApiToken: ""
  atlassianEmail: ""

# ── Persistent Storage ────────────────────────────────────────────────────────

persistence:
  enabled: false
  accessMode: ReadWriteOnce
  storageClass: ""
  size: 5Gi

# ── Node Scheduling ──────────────────────────────────────────────────────────

nodeSelector: {}
tolerations: []
