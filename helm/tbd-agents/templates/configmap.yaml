apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tbd-agents.fullname" . }}-config
  labels:
    {{- include "tbd-agents.labels" . | nindent 4 }}
data:
  MONGO_URI: {{ .Values.config.mongoUri | quote }}
  MONGO_DB_NAME: {{ .Values.config.mongoDbName | quote }}
  DEFAULT_MODEL: {{ .Values.config.defaultModel | quote }}
  DEFAULT_MAX_TURNS: {{ .Values.config.defaultMaxTurns | quote }}
  SESSION_TIMEOUT: {{ .Values.config.sessionTimeout | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelEndpoint | quote }}
  OTEL_RESOURCE_ATTRIBUTES: "service.version={{ .Chart.AppVersion }},deployment.environment={{ .Values.config.environment }}"
  {{- if .Values.config.ddSite }}
  DD_SITE: {{ .Values.config.ddSite | quote }}
  {{- end }}
  {{- if .Values.config.atlassianUrl }}
  ATLASSIAN_URL: {{ .Values.config.atlassianUrl | quote }}
  {{- end }}
