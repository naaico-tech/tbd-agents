apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tbd-agents.fullname" . }}-worker
  labels:
    {{- include "tbd-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.keda.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tbd-agents.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "tbd-agents.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.worker.concurrency }}
          envFrom:
            - secretRef:
                name: {{ include "tbd-agents.fullname" . }}-env
            - configMapRef:
                name: {{ include "tbd-agents.fullname" . }}-config
          env:
            - name: OTEL_SERVICE_NAME
              value: tbd-agents-worker
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: repos
              mountPath: /repos
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: repos
          persistentVolumeClaim:
            claimName: {{ include "tbd-agents.fullname" . }}-repos
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
