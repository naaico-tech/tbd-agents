apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tbd-agents.fullname" . }}-env
  labels:
    {{- include "tbd-agents.labels" . | nindent 4 }}
type: Opaque
stringData:
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  {{- if .Values.secrets.githubToken }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
  {{- end }}
  {{- if .Values.secrets.tokenEncryptionKey }}
  TOKEN_ENCRYPTION_KEY: {{ .Values.secrets.tokenEncryptionKey | quote }}
  {{- end }}
  {{- if .Values.secrets.ddApiKey }}
  DD_API_KEY: {{ .Values.secrets.ddApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.ddAppKey }}
  DD_APP_KEY: {{ .Values.secrets.ddAppKey | quote }}
  {{- end }}
  {{- if .Values.secrets.atlassianApiToken }}
  ATLASSIAN_API_TOKEN: {{ .Values.secrets.atlassianApiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.atlassianEmail }}
  ATLASSIAN_EMAIL: {{ .Values.secrets.atlassianEmail | quote }}
  {{- end }}
  {{- if .Values.secrets.notionToken }}
  NOTION_TOKEN: {{ .Values.secrets.notionToken | quote }}
  {{- end }}
  {{- if .Values.secrets.slackBotToken }}
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | quote }}
  {{- end }}
