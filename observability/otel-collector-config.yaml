receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 50

exporters:
  # Prometheus (metrics)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: copilot_hub
    const_labels:
      service: copilot-agent-hub

  # Tempo (traces)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Debug logging (optional — useful for verifying data flows)
  debug:
    verbosity: basic

connectors:
  # Generate metrics from spans (RED metrics: Rate, Errors, Duration)
  spanmetrics:
    histogram:
      explicit:
        buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30, 60, 120, 300]
    dimensions:
      - name: http.method
      - name: http.route
      - name: http.status_code
      - name: rpc.method

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, spanmetrics, debug]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
