global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # OpenTelemetry Collector's Prometheus exporter
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # FastAPI app metrics (prometheus-fastapi-instrumentator)
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  # Celery worker metrics (prometheus_client HTTP server)
  - job_name: celery-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9101"]
